# Build & test on every push to main and every pull request.
#
# This job runs on ubuntu-latest and only builds the Tauri (Rust) crate far
# enough to run its pure Rust unit tests (`cargo test --lib`) - it does NOT
# produce an app bundle/installer. The Tauri crate still needs the Linux
# WebKitGTK/GTK system libraries installed just to *compile*, even though
# nothing is packaged or run headlessly here. The real Windows build that
# produces installers happens in release.yml on windows-latest.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Tauri v2 Linux system dependencies, required to compile the tauri
      # crate that `cargo test --lib` pulls in (no bundling happens here).
      - name: Install Tauri v2 Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install node dependencies
        run: npm ci

      - name: Type-check (svelte-check + tsc)
        run: npm run check

      - name: Run frontend tests
        run: npx vitest run

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
